version: '3.8'

name: elasticsearch-study

services:
  mysql:
    image: mysql:8.0
    container_name: jonghyun-es-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: elasticsearchdb
      MYSQL_USER: jonghyun-mysql
      MYSQL_PASSWORD: jonghyun-mysql
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - study-network

  redis:
    image: redis:7-alpine
    container_name: jonghyun-es-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - study-network

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jonghyun-es
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Seoul
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - study-network

  kibana:
    image: kibana:8.17.0
    container_name: jonghyun-es-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - TZ=Asia/Seoul
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - study-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  es-data:
    driver: local

networks:
  study-network:
    driver: bridge
